services:
  postgres:
    image: postgres:16
    container_name: florence-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: florence
      POSTGRES_PASSWORD: florence
      POSTGRES_DB: florence
    ports:
      - "5432:5432"
    volumes:
      - florence-pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U florence -d florence"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  florence-pgdata:
